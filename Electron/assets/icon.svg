      <stop offset="1" stop-color="#11151d"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="256" cy="246" r="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.58"/>
      <stop offset="0.42" stop-color="#7c6df2" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#090b10" stop-opacity="0"/>
